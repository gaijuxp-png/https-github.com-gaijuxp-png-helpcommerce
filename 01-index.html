<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <!-- Meta Tags -->
    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <!-- 🔐 Content Security Policy (Melhorada) -->
    <meta http-equiv="Content-Security-Policy"
    content="
    default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline';
    img-src 'self' data:;
    font-src 'self';
    connect-src 'self';
    media-src 'self';
    object-src 'none';
    base-uri 'self';
    form-action 'self';
    frame-ancestors 'none';
    upgrade-insecure-requests;
    ">

    <meta name="description"
    content="Helpcommerce - Dashboard Financeiro Profissional para PMEs">

    <meta name="theme-color"
    content="#1E3A8A">

    <!-- Favicon -->
    <link rel="icon"
    type="image/svg+xml"
    href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg'
    viewBox='0 0 100 100'>
    <text y='75'
    font-size='75'
    font-weight='bold'
    fill='%231E3A8A'>H</text>
    </svg>">

    <!-- Título -->
    <title>Helpcommerce - Dashboard Financeiro</title>

    <!-- CSS -->
    <link rel="stylesheet"
    href="styles.css">

</head>

<body>

<header class="main-header">
<div class="container header-container">

<div class="logo-section">
<h1 class="logo">
<span class="logo-icon">💰</span>
Helpcommerce
</h1>
</div>

<nav class="main-nav">
<ul>
<li><a href="#dashboard-section">Dashboard</a></li>
<li><a href="#transactions-section">Transações</a></li>
<li><a href="#add-transaction-section">Adicionar</a></li>
</ul>
</nav>

</div>
</header>

<main class="main-content">
<div class="container">

<section id="dashboard-section">

<h2>Visão Geral Financeira</h2>

<p id="total-income">R$ 0,00</p>
<p id="total-expense">R$ 0,00</p>
<p id="net-total">R$ 0,00</p>

</section>

<section id="add-transaction-section">

<h2>Adicionar Nova Transação</h2>

<form id="transaction-form"
autocomplete="off">

<!-- Descrição -->
<label for="description">
Descrição *
</label>

<input
type="text"
id="description"
placeholder="Ex: Venda de Produto X"
maxlength="255"
pattern="[A-Za-z0-9À-ÿ\s.,()-]+"
required
>

<!-- Valor -->
<label for="amount">
Valor *
</label>

<input
type="number"
id="amount"
placeholder="0.00"
step="0.01"
min="0.01"
required
>

<!-- Tipo -->
<label for="type">
Tipo *
</label>

<select
id="type"
required>

<option value="">
Selecione um tipo
</option>

<option value="income">
Receita
</option>

<option value="expense">
Despesa
</option>

</select>

<!-- Categoria -->
<label for="category">
Categoria (Opcional)
</label>

<input
type="text"
id="category"
maxlength="100"
pattern="[A-Za-z0-9À-ÿ\s]+"
placeholder="Ex: Vendas"
>

<button type="submit">
Adicionar Transação
</button>

</form>

</section>

<section id="transactions-section">

<h2>Transações</h2>

<ul
id="transaction-list">
</ul>

</section>

</div>
</main>

<footer class="main-footer">

<p>
© 2024 Helpcommerce
</p>

</footer>

<script
src="script.js"
defer>
</script>

</body>
</html>
