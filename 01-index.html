<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <!-- Meta Tags -->
    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <!-- 🔐 Content Security Policy (MÁXIMA) -->
    <meta http-equiv="Content-Security-Policy"
    content="
    default-src 'none';
    script-src 'self';
    style-src 'self';
    img-src 'self' data:;
    font-src 'self';
    connect-src 'self';
    media-src 'self';
    object-src 'none';
    base-uri 'self';
    form-action 'self';
    frame-ancestors 'none';
    upgrade-insecure-requests;
    block-all-mixed-content;
    ">

    <!-- 🔐 X-Content-Type-Options -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">

    <!-- 🔐 X-Frame-Options -->
    <meta http-equiv="X-Frame-Options" content="DENY">

    <!-- 🔐 Referrer Policy -->
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <!-- 🔐 Permissions Policy -->
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()">

    <meta name="description"
    content="Helpcommerce - Dashboard Financeiro Profissional para PMEs">

    <meta name="theme-color"
    content="#1E3A8A">

    <!-- Favicon -->
    <link rel="icon"
    type="image/svg+xml"
    href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg'
    viewBox='0 0 100 100'>
    <text y='75'
    font-size='75'
    font-weight='bold'
    fill='%231E3A8A'>H</text>
    </svg>">

    <!-- Título -->
    <title>Helpcommerce - Dashboard Financeiro</title>

    <!-- CSS -->
    <link rel="stylesheet"
    href="styles.css">

</head>

<body>

<header class="main-header">
<div class="container header-container">

<div class="logo-section">
<h1 class="logo">
<span class="logo-icon">💰</span>
Helpcommerce
</h1>
</div>

<nav class="main-nav">
<ul>
<li><a href="#dashboard-section" class="nav-link">Dashboard</a></li>
<li><a href="#transactions-section" class="nav-link">Transações</a></li>
<li><a href="#add-transaction-section" class="nav-link">Adicionar</a></li>
</ul>
</nav>

</div>
</header>

<main class="main-content">
<div class="container">

<section id="dashboard-section">

<h2>Visão Geral Financeira</h2>

<p id="total-income">R$ 0,00</p>
<p id="total-expense">R$ 0,00</p>
<p id="net-total">R$ 0,00</p>

</section>

<section id="add-transaction-section">

<h2>Adicionar Nova Transação</h2>

<form id="transaction-form"
autocomplete="off"
novalidate>

<!-- Descrição -->
<label for="description">
Descrição *
</label>

<input
type="text"
id="description"
class="form-input"
placeholder="Ex: Venda de Produto X"
maxlength="255"
required
autocomplete="off"
spellcheck="false"
>

<!-- Valor -->
<label for="amount">
Valor *
</label>

<input
type="number"
id="amount"
class="form-input"
placeholder="0.00"
step="0.01"
min="0.01"
max="999999999.99"
required
inputmode="decimal"
>

<!-- Tipo -->
<label for="type">
Tipo *
</label>

<select
id="type"
class="form-select"
required>

<option value="">
Selecione um tipo
</option>

<option value="income">
Receita
</option>

<option value="expense">
Despesa
</option>

</select>

<!-- Categoria -->
<label for="category">
Categoria (Opcional)
</label>

<input
type="text"
id="category"
class="form-input"
maxlength="100"
placeholder="Ex: Vendas"
autocomplete="off"
>

<button type="submit" class="btn btn-primary">
Adicionar Transação
</button>

</form>

<!-- 🔐 Mensagens de feedback -->
<div class="form-feedback">
  <div id="success-message" class="message success-message" role="alert" style="display: none;"></div>
  <div id="error-message" class="message error-message" role="alert" style="display: none;"></div>
</div>

</section>

<section id="transactions-section">

<h2>Transações</h2>

<div class="filter-controls">
  <input 
    type="text" 
    id="search-input" 
    class="form-input search-input" 
    placeholder="Buscar..."
    autocomplete="off"
  >
  <select id="filter-type" class="form-select">
    <option value="all">Todos</option>
    <option value="income">Receita</option>
    <option value="expense">Despesa</option>
  </select>
</div>

<ul
id="transaction-list"
role="list">
</ul>

<div id="no-transactions" class="no-transactions-message" role="status" style="display: none;">
  Nenhuma transação encontrada.
</div>

</section>

</div>
</main>

<footer class="main-footer">

<p>
© 2024 Helpcommerce. Todos os direitos reservados.
</p>

</footer>

<!-- 🔐 Script com integrity -->
<script
src="script.js"
defer
integrity="sha384-PLACEHOLDER">
</script>

</body>
</html>
